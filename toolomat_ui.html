<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Toolomat – UI</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; }
h1 { color:#6cf; }
button { background:#111; color:#6cf; border:1px solid #333; padding:10px; margin:5px; }
pre { background:#111; border:1px solid #333; padding:10px; }
</style>
</head>

<body>

<h1>Toolomat – UI</h1>

<button onclick="uiStatus()">UI‑Status</button>

<pre id="ui"></pre>

<script>
function uiStatus() {
    document.getElementById("ui").innerText =
`UI‑System:
- Version: 1.1
- Status: Aktiv
- ROOT‑UI‑Mapping: OK
- DOM‑Verbindung: Stabil`;
}
</script>

</body>
</html>
