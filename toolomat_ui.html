<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TOOLOMAT UI – Achsensteuerung</title>

<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px;}
h1{color:#6cf;}
.axis-grid{
  display:grid;
  grid-template-columns:repeat(3,120px);
  grid-template-rows:repeat(3,120px);
  gap:6px;
  margin:auto;
  width:max-content;
}
.cell{
  border:1px solid #333;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  background:#111;
}
.center{
  background:#222;
  border:2px solid #0f0;
}
button{
  padding:8px 16px;
  background:#111;
  color:#0f0;
  border:1px solid #333;
  cursor:pointer;
  margin:10px;
}
</style>
</head>

<body>

<h1>TOOLOMAT UI – Achsensteuerung</h1>

<div class="axis-grid">
  <div class="cell">AH</div>
  <div class="cell">Q1</div>
  <div class="cell">HA</div>

  <div class="cell">Q4</div>
  <div class="cell center" id="nc">NC</div>
  <div class="cell">Q2</div>

  <div class="cell">ÄH</div>
  <div class="cell">Q3</div>
  <div class="cell">HÄ</div>
</div>

<button onclick="sendAxes()">SEND AXES</button>

<script src="../GEOMETRIA.js"></script>
<script src="toolomat_scripts.js"></script>

</body>
</html>
